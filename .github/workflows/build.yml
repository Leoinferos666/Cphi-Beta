name: Build CPHI Windows

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Application
        shell: cmd
        run: pyinstaller --clean --noconfirm --onedir --windowed --name "CPHI Beta" --collect-all streamlit run.py

      - name: Copy Project Files
        shell: pwsh
        run: |
          Copy-Item app.py "dist/CPHI Beta/"
          Copy-Item -Recurse pages "dist/CPHI Beta/"
          Copy-Item -Recurse tests "dist/CPHI Beta/"
          Copy-Item -Recurse utils "dist/CPHI Beta/"
          Copy-Item -Recurse components "dist/CPHI Beta/"
          Copy-Item -Recurse .streamlit "dist/CPHI Beta/"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPHI-Beta-Windows
          path: dist/CPHI Beta
