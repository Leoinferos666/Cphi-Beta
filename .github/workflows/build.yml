name: Build CPHI Windows

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Install PyInstaller
        run: |
          pip install pyinstaller

      - name: Build Application
        run: |
          pyinstaller 
            --clean 
            --noconfirm 
            --onedir 
            --windowed 
            --name "CPHI Beta" 
            --collect-all streamlit 
            run.py

      - name: Copy Project Files
        shell: powershell
        run: |
          Copy-Item app.py dist/"CPHI Beta"/
          Copy-Item -Recurse pages dist/"CPHI Beta"/
          Copy-Item -Recurse tests dist/"CPHI Beta"/
          Copy-Item -Recurse utils dist/"CPHI Beta"/
          Copy-Item -Recurse components dist/"CPHI Beta"/
          Copy-Item -Recurse .streamlit dist/"CPHI Beta"/

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: CPHI-Beta-Windows
          path: dist/CPHI Beta
